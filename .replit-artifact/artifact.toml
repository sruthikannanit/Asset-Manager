kind = "web"
previewPath = "/"
title = "Team Daily Tracker"
version = "1.0.0"
id = "artifacts/team-daily-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26263

[services.development]
run = "pnpm --filter @workspace/team-daily-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/team-daily-tracker", "run", "build" ]
publicDir = "artifacts/team-daily-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26263"
BASE_PATH = "/"
